project:
  output_dir: outputs
  random_state: 42

pubmed:
  email: your.email@example.com
  api_key: null
  start_year: 2010
  end_year: 2026
  candidates_per_group: 200
  target_successful_per_group: 50
  retmax: 1000
  sleep_seconds: 0.35
  fetch_batch_size: 100
  topic_query: |
    (
      "Periodontal Diseases"[Mesh]
      OR periodontitis[tiab]
      OR periodontal[tiab]
      OR "periodontal disease"[tiab]
      OR "periodontal diseases"[tiab]
    )
    AND english[lang]
    AND hasabstract

models:
  llm_model: gpt-5.4-mini
  embedding_model: all-MiniLM-L6-v2
  sleep_between_llm_calls: 0.5

analysis:
  min_sentences: 5
  required_roles:
    - Methods
    - Results
